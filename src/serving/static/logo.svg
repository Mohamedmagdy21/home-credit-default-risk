<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b6cb0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd54f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb300;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Circle background -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)" filter="url(#shadow)" />

  <!-- House body -->
  <rect x="120" y="200" width="160" height="130" rx="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2" />

  <!-- Roof -->
  <polygon points="100,210 200,120 300,210" fill="url(#roof)" stroke="#f59e0b" stroke-width="2" />

  <!-- Door -->
  <rect x="175" y="260" width="50" height="70" rx="4" fill="#2d3748" />

  <!-- Door knob -->
  <circle cx="215" cy="300" r="4" fill="#f6e05e" />

  <!-- Window left -->
  <rect x="135" y="225" width="35" height="35" rx="3" fill="#bee3f8" stroke="#90cdf4" stroke-width="1.5" />
  <line x1="152.5" y1="225" x2="152.5" y2="260" stroke="#90cdf4" stroke-width="1.5" />
  <line x1="135" y1="242.5" x2="170" y2="242.5" stroke="#90cdf4" stroke-width="1.5" />

  <!-- Window right -->
  <rect x="230" y="225" width="35" height="35" rx="3" fill="#bee3f8" stroke="#90cdf4" stroke-width="1.5" />
  <line x1="247.5" y1="225" x2="247.5" y2="260" stroke="#90cdf4" stroke-width="1.5" />
  <line x1="230" y1="242.5" x2="265" y2="242.5" stroke="#90cdf4" stroke-width="1.5" />

  <!-- Shield overlay bottom-right -->
  <g transform="translate(245, 170)">
    <path d="M30,0 L60,15 L60,45 C60,65 30,80 30,80 C30,80 0,65 0,45 L0,15 Z" fill="url(#shield)" stroke="#2f855a" stroke-width="2" filter="url(#shadow)"/>
    <path d="M15,38 L25,50 L45,25" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="200" y="370" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#e2e8f0" letter-spacing="2">
    FAIR LOAN APPROVAL
  </text>
</svg>
